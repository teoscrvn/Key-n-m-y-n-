<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>✨ KEY•FORGE · Ultra Neon Vault ✨</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>

  <style>
    /* =========================================
       1. HỆ THỐNG CSS CUSTOM (MỞ RỘNG)
       =========================================
    */
    :root {
      --cyan: #00d2ff;
      --green: #00ffaa;
      --red: #ff3b3b;
      --dark-bg: #020205;
      --glass-bg: rgba(5, 10, 25, 0.8);
      --border-glow: rgba(0, 210, 255, 0.3);
      --font-orb: 'Orbitron', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: var(--dark-bg);
      font-family: 'Inter', sans-serif;
      color: #e0f2fe;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow-x: hidden;
    }

    /* Nền hiệu ứng hạt (Dài dòng để tăng line code & thẩm mỹ) */
    #particle-canvas {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1; pointer-events: none;
    }

    .container {
      width: 95%; max-width: 850px;
      z-index: 10; position: relative;
      padding: 20px 0;
    }

    /* Giữ style Neon Card của ông và nâng cấp shadow */
    .neon-card {
      background: var(--glass-bg);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1.5px solid var(--border-glow);
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.8), inset 0 0 15px rgba(0, 210, 255, 0.05);
      border-radius: 35px;
      padding: 3rem;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .glow-text {
      text-shadow: 0 0 15px var(--cyan), 0 0 30px rgba(0, 166, 255, 0.5);
      font-family: var(--font-orb);
      letter-spacing: 2px;
    }

    /* Input Styling */
    .input-wrapper { margin-bottom: 20px; }
    .input-label {
      display: block; margin-bottom: 10px;
      font-size: 0.75rem; color: var(--cyan);
      font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase;
    }

    .neon-input {
      width: 100%; background: rgba(0, 8, 20, 0.6);
      border: 2px solid #1e3a5f; color: #fff;
      border-radius: 15px; padding: 14px 20px;
      font-size: 1rem; outline: none; transition: 0.3s;
    }
    .neon-input:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 20px rgba(0, 210, 255, 0.4), inset 0 0 10px rgba(0,0,0,0.5);
    }

    /* Button Styling */
    .neon-btn {
      background: transparent; border: 2px solid var(--cyan);
      color: var(--cyan); font-weight: 800; padding: 12px 25px;
      border-radius: 50px; font-family: var(--font-orb);
      cursor: pointer; transition: 0.3s; text-transform: uppercase;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      box-shadow: 0 0 15px rgba(0, 210, 255, 0.2);
    }
    .neon-btn:hover:not(:disabled) {
      background: var(--cyan); color: #000;
      box-shadow: 0 0 30px var(--cyan);
    }
    .neon-btn:disabled {
      opacity: 0.3; cursor: not-allowed; border-color: #444; color: #666;
    }

    /* Anti-Bypass Steps UI */
    .bypass-container {
      margin: 30px 0; display: flex; flex-direction: column; gap: 15px;
    }
    .step-box {
      background: rgba(255, 255, 255, 0.03);
      padding: 15px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05);
      display: flex; align-items: center; justify-content: space-between;
    }
    .timer-badge {
      background: var(--red); color: #fff; padding: 4px 12px;
      border-radius: 50px; font-size: 0.8rem; font-weight: bold;
      font-family: 'Fira Code';
    }

    /* Key Result Display */
    #key-result-area {
      display: none; text-align: center;
      animation: slideUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .key-display-box {
      background: #000; border: 2px solid var(--green);
      border-radius: 25px; padding: 25px; margin: 25px 0;
      box-shadow: 0 0 30px rgba(0, 255, 170, 0.2);
    }

    /* Music Visualizer Widget */
    .music-widget {
      position: fixed; bottom: 25px; right: 25px;
      background: rgba(0,0,0,0.85); padding: 12px 20px;
      border-radius: 100px; border: 1px solid var(--cyan);
      display: none; align-items: center; gap: 12px; z-index: 1000;
    }
    .vis-bar { width: 3px; height: 15px; background: var(--cyan); border-radius: 10px; }
    .bar-1 { animation: vis 0.5s infinite alternate; }
    .bar-2 { animation: vis 0.7s infinite alternate 0.1s; }
    .bar-3 { animation: vis 0.6s infinite alternate 0.2s; }
    @keyframes vis { from { height: 5px; } to { height: 20px; } }

    /* Mobile Responsive */
    @media (max-width: 600px) {
      .neon-card { padding: 1.5rem; border-radius: 25px; }
      .glow-text { font-size: 1.8rem !important; }
    }
  </style>
</head>
<body>

<canvas id="particle-canvas"></canvas>

<audio id="bgNhac" loop>
  <source src="https://raw.githubusercontent.com/teoscrvn/Key-n-m-y-n-/9bb272229e900af4e6291cf179a896e7d762933a/Tnh%20Bn%20Diu%20K%20-%20Amee%20x%20Ricky%20Star%20x%20Lng%20LD%20%20TIKI%20DROPS%20REMIX.mp3" type="audio/mpeg">
</audio>

<div class="container">

  <div id="creator-section" style="display: none;">
    <div class="neon-card">
      <h1 class="glow-text" style="font-size: 2.5rem; margin-bottom: 30px;">
        <i class="fas fa-hammer"></i> KEY•FORGE BUILDER
      </h1>

      <div class="input-wrapper">
        <label class="input-label">Nội dung Key bí mật</label>
        <input type="text" id="inputKey" class="neon-input" placeholder="Ví dụ: ADMIN-SECURE-2026">
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px;">
        <div class="input-wrapper">
          <label class="input-label">Tiêu đề nút 1</label>
          <input type="text" id="title1" class="neon-input" placeholder="Link 1">
        </div>
        <div class="input-wrapper">
          <label class="input-label">URL Link 1</label>
          <input type="text" id="url1" class="neon-input" placeholder="https://...">
        </div>
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px;">
        <div class="input-wrapper">
          <label class="input-label">Tiêu đề nút 2</label>
          <input type="text" id="title2" class="neon-input" placeholder="Link 2">
        </div>
        <div class="input-wrapper">
          <label class="input-label">URL Link 2</label>
          <input type="text" id="url2" class="neon-input" placeholder="https://...">
        </div>
      </div>

      <button class="neon-btn" style="width: 100%;" id="btnGenerate">
        <i class="fas fa-link"></i> KHỞI TẠO LINK TRUY CẬP
      </button>

      <div id="history-area" style="margin-top: 40px;">
        <h3 style="font-family: var(--font-orb); font-size: 0.9rem; color: var(--cyan); margin-bottom: 20px;">LỊCH SỬ TẠO KEY</h3>
        <div id="history-list"></div>
      </div>
    </div>
  </div>

  <div id="viewer-section" style="display: none;">
    <div class="neon-card" style="max-width: 650px; margin: 0 auto; text-align: center;">
      <h1 class="glow-text">SECURITY GATE</h1>
      <p style="opacity: 0.6; margin-top: 10px;">Hoàn thành thử thách để nhận Key Premium</p>

      <div class="bypass-container" id="challenge-area">
        <div class="step-box">
          <span style="font-weight: bold; color: var(--cyan);">BƯỚC 01</span>
          <button class="neon-btn" id="btnStep1" style="min-width: 200px;">
            <i class="fas fa-external-link-alt"></i> <span id="labelT1">TRUY CẬP LINK 1</span>
          </button>
        </div>

        <div class="step-box">
          <span style="font-weight: bold; opacity: 0.5;">BƯỚC 02</span>
          <button class="neon-btn" id="btnStep2" disabled style="min-width: 200px;">
            <i class="fas fa-lock"></i> <span id="labelT2">TRUY CẬP LINK 2</span>
          </button>
        </div>

        <div style="margin-top: 20px;">
          <button class="neon-btn" id="btnUnlockKey" disabled style="width: 100%; border-color: var(--green); color: var(--green);">
            <i class="fas fa-check-circle"></i> NHẬN KEY NGAY
          </button>
        </div>
      </div>

      <div id="key-result-area">
        <div class="key-display-box">
          <p style="font-size: 0.8rem; color: var(--green); letter-spacing: 2px; margin-bottom: 10px;">XÁC MINH THÀNH CÔNG!</p>
          <code id="finalKeyText" style="font-size: 2rem; font-weight: 900; color: #fff;">------</code>
        </div>
        <button class="neon-btn" style="width: 100%;" onclick="copyFinalKey()">
          <i class="fas fa-copy"></i> SAO CHÉP VÀO BỘ NHỚ
        </button>
        <p style="margin-top: 20px; font-size: 0.8rem; color: var(--red);" id="expireMsg"></p>
      </div>

      <div id="expired-error" style="display: none;">
        <h2 style="color: var(--red);">LINK ĐÃ HẾT HẠN!</h2>
        <p>Link này chỉ tồn tại trong 24 giờ kể từ khi được tạo.</p>
      </div>
      
      <button class="neon-btn" style="margin-top: 30px; font-size: 0.7rem; border-color: #555; color: #777;" onclick="location.href=location.pathname">
        <i class="fas fa-home"></i> QUAY LẠI TRANG CHỦ
      </button>
    </div>
  </div>

</div>

<div class="music-widget" id="musicUI">
  <div class="vis-bar bar-1"></div>
  <div class="vis-bar bar-2"></div>
  <div class="vis-bar bar-3"></div>
  <span style="font-size: 0.65rem; color: var(--cyan); font-family: 'Fira Code';">AUDIO ACTIVE</span>
</div>

<script>
(function() {
  "use strict";

  const STORAGE_KEY = 'forge_v8_db';
  const nhac = document.getElementById('bgNhac');

  // Helper: Mã hóa / Giải mã URL an toàn hơn tí
  const encodeData = (str) => btoa(encodeURIComponent(str));
  const decodeData = (str) => decodeURIComponent(atob(str));

  // --- PHẦN 1: LOGIC TẠO KEY (CREATOR) ---
  function initCreator() {
    document.getElementById('creator-section').style.display = 'block';
    const listCont = document.getElementById('history-list');
    
    const renderHistory = () => {
      const db = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      if(db.length === 0) {
        listCont.innerHTML = '<p style="opacity: 0.3; font-style: italic;">Chưa có dữ liệu...</p>';
        return;
      }
      listCont.innerHTML = db.sort((a,b) => b.id - a.id).map(item => {
        const link = `${location.origin}${location.pathname}?k=${encodeData(item.key)}&e=${item.exp}&l1=${encodeData(item.l1)}&t1=${encodeData(item.t1)}&l2=${encodeData(item.l2)}&t2=${encodeData(item.t2)}`;
        return `
          <div style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; margin-bottom: 10px; border-left: 4px solid var(--cyan);">
            <div style="font-weight: bold; margin-bottom: 5px;">${item.key}</div>
            <button class="neon-btn" style="font-size: 0.6rem; padding: 5px 10px;" onclick="navigator.clipboard.writeText('${link}');alert('Đã copy link truy cập!')">COPY LINK CHIA SẺ</button>
          </div>
        `;
      }).join('');
    };

    renderHistory();

    document.getElementById('btnGenerate').onclick = () => {
      const key = document.getElementById('inputKey').value.trim();
      const l1 = document.getElementById('url1').value.trim() || 'https://google.com';
      const t1 = document.getElementById('title1').value.trim() || 'Link 1';
      const l2 = document.getElementById('url2').value.trim() || 'https://google.com';
      const t2 = document.getElementById('title2').value.trim() || 'Link 2';

      if(!key) return alert("Vui lòng nhập Key bí mật!");

      let db = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      db.push({ id: Date.now(), key, l1, t1, l2, t2, exp: Date.now() + 86400000 });
      localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
      
      document.getElementById('inputKey').value = '';
      renderHistory();
      alert("Đã tạo Key thành công! Hãy copy link ở danh sách bên dưới.");
    };
  }

  // --- PHẦN 2: LOGIC NHẬN KEY (VIEWER) ---
  function initViewer() {
    const params = new URLSearchParams(window.location.search);
    const kEnc = params.get('k'), exp = params.get('e'), l1 = params.get('l1'), t1 = params.get('t1'), l2 = params.get('l2'), t2 = params.get('t2');

    if(!kEnc || !exp) return initCreator();

    document.getElementById('viewer-section').style.display = 'block';

    // Kiểm tra hết hạn (24h)
    if(Date.now() > parseInt(exp)) {
      document.getElementById('challenge-area').style.display = 'none';
      document.getElementById('expired-error').style.display = 'block';
      return;
    }

    // Set tiêu đề nút từ tham số URL
    const label1 = decodeData(t1);
    const label2 = decodeData(t2);
    document.getElementById('labelT1').innerText = label1;
    document.getElementById('labelT2').innerText = label2;

    const b1 = document.getElementById('btnStep1');
    const b2 = document.getElementById('btnStep2');
    const bFinal = document.getElementById('btnUnlockKey');

    // Bước 1
    b1.onclick = () => {
      window.open(decodeData(l1), '_blank');
      b1.disabled = true;
      let count = 10;
      const timer = setInterval(() => {
        b1.innerHTML = `<i class="fas fa-spinner fa-spin"></i> KIỂM TRA (${count}s)`;
        if(count <= 0) {
          clearInterval(timer);
          b1.innerHTML = `<i class="fas fa-check"></i> Xong!`;
          b2.disabled = false;
          b2.innerHTML = `<i class="fas fa-external-link-alt"></i> ${label2}`;
          b2.parentElement.style.opacity = "1";
        }
        count--;
      }, 1000);
    };

    // Bước 2
    b2.onclick = () => {
      window.open(decodeData(l2), '_blank');
      b2.disabled = true;
      let count = 10;
      const timer = setInterval(() => {
        b2.innerHTML = `<i class="fas fa-spinner fa-spin"></i> KIỂM TRA (${count}s)`;
        if(count <= 0) {
          clearInterval(timer);
          b2.innerHTML = `<i class="fas fa-check"></i> Xong!`;
          bFinal.disabled = false;
          bFinal.style.boxShadow = "0 0 20px var(--green)";
        }
        count--;
      }, 1000);
    };

    // Bước Cuối: Nhận Key & Nổ Nhạc
    bFinal.onclick = () => {
      document.getElementById('challenge-area').style.display = 'none';
      document.getElementById('key-result-area').style.display = 'block';
      document.getElementById('finalKeyText').innerText = decodeData(kEnc);
      
      // PHÁO HOA
      confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 } });

      // NHẠC TỰ ĐỘNG
      nhac.play().catch(e => console.log("Cần tương tác người dùng để phát nhạc"));
      document.getElementById('musicUI').style.display = 'flex';

      // Đếm ngược hết hạn
      setInterval(() => {
        const diff = parseInt(exp) - Date.now();
        if(diff <= 0) location.reload();
        const h = Math.floor(diff/3600000).toString().padStart(2,'0');
        const m = Math.floor((diff%3600000)/60000).toString().padStart(2,'0');
        const s = Math.floor((diff%60000)/1000).toString().padStart(2,'0');
        document.getElementById('expireMsg').innerText = `Lưu ý: Link này sẽ vô hiệu hóa sau ${h}:${m}:${s}`;
      }, 1000);
    };
  }

  window.copyFinalKey = () => {
    const text = document.getElementById('finalKeyText').innerText;
    navigator.clipboard.writeText(text).then(() => alert("Đã copy Key bí mật!"));
  };

  // --- PHẦN 3: HIỆU ỨNG HẠT NỀN (Vẽ thủ công) ---
  const canvas = document.getElementById('particle-canvas');
  const ctx = canvas.getContext('2d');
  let particles = [];

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.onresize = resize;
  resize();

  class Particle {
    constructor() {
      this.reset();
    }
    reset() {
      this.x = Math.random() * canvas.width;
      this.y = Math.random() * canvas.height;
      this.vx = (Math.random() - 0.5) * 0.5;
      this.vy = (Math.random() - 0.5) * 0.5;
      this.size = Math.random() * 2;
    }
    update() {
      this.x += this.vx;
      this.y += this.vy;
      if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
        this.reset();
      }
    }
    draw() {
      ctx.fillStyle = "rgba(0, 210, 255, 0.5)";
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function initParticles() {
    for (let i = 0; i < 100; i++) {
      particles.push(new Particle());
    }
  }

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      p.update();
      p.draw();
    });
    requestAnimationFrame(animate);
  }

  initParticles();
  animate();

  // Khởi động Viewer
  initViewer();

})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>✨ KEY GLOW · Neon Vault ✨</title>
  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Confetti for fireworks -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 20% 30%, #0b0e1e, #010101);
      font-family: 'Inter', sans-serif;
      color: #e0f2fe;
      padding: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Neon glow utilities */
    .glow-text {
      text-shadow: 0 0 12px #00a6ff, 0 0 25px #0050b3;
      font-family: 'Orbitron', sans-serif;
      letter-spacing: 2px;
    }

    .neon-card {
      background: rgba(5, 10, 20, 0.75);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(0, 180, 255, 0.35);
      box-shadow: 0 0 30px rgba(0, 160, 255, 0.2), inset 0 0 10px rgba(0, 200, 255, 0.1);
      border-radius: 32px;
      padding: 2rem 2rem 2rem 2rem;
      transition: all 0.2s;
    }

    .neon-input {
      background: #0a111f;
      border: 1.5px solid #1e3a5f;
      color: #b3e4ff;
      border-radius: 60px;
      padding: 0.9rem 1.5rem;
      font-size: 1.1rem;
      outline: none;
      transition: 0.2s;
      box-shadow: inset 0 0 8px #00000066, 0 0 5px #0066ff40;
    }

    .neon-input:focus {
      border-color: #00b4ff;
      box-shadow: 0 0 20px #0077ff, inset 0 0 5px #001d3d;
    }

    .neon-btn {
      background: transparent;
      border: 2px solid #0af;
      color: #0af;
      font-weight: 700;
      padding: 0.8rem 2rem;
      border-radius: 60px;
      font-family: 'Orbitron', sans-serif;
      letter-spacing: 1.5px;
      backdrop-filter: blur(8px);
      box-shadow: 0 0 15px #00a6ff, inset 0 0 5px #00aaff;
      transition: 0.2s;
      cursor: pointer;
      text-transform: uppercase;
    }

    .neon-btn:hover {
      background: #0af;
      color: #010101;
      box-shadow: 0 0 30px #3ab4ff, 0 0 10px #ffffff;
      border-color: #ffffff;
    }

    .key-display-box {
      background: #03070e;
      border: 2px solid #ff3b3b;
      box-shadow: 0 0 30px #ff0000aa, inset 0 0 15px #4a0000;
      border-radius: 28px;
      padding: 1.8rem;
      text-align: center;
    }

    .timer-glow {
      color: #ffb86b;
      text-shadow: 0 0 8px #ff7b00;
    }

    /* List items */
    .key-item {
      background: #0a1424cc;
      border-left: 6px solid #0af;
      border-radius: 20px;
      padding: 1rem 1.5rem;
      margin: 0.8rem 0;
      backdrop-filter: blur(5px);
      box-shadow: 0 0 12px #002bff40;
    }

    /* Music control */
    .music-toggle {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #101b2bdd;
      border: 1px solid cyan;
      border-radius: 60px;
      padding: 10px 18px;
      color: #a0e7ff;
      backdrop-filter: blur(8px);
      z-index: 999;
      cursor: pointer;
      font-weight: bold;
    }

    /* Container max-width */
    .container {
      max-width: 1000px;
      width: 100%;
      margin: 0 auto;
    }

    h1, h2 {
      font-family: 'Orbitron', sans-serif;
    }

    .copy-feedback {
      color: #7effb7;
      margin-left: 12px;
      font-size: 0.9rem;
    }

    .expired-badge {
      color: #ff7b7b;
      border: 1px solid red;
      padding: 2px 12px;
      border-radius: 40px;
    }
  </style>
</head>
<body>

<!-- Background Music (royalty-free lofi, autoplay attempt on user gesture) -->
<audio id="bgMusic" loop preload="auto">
  <source src="https://cdn.pixabay.com/audio/2023/09/07/audio_5b9b9b9b9b.mp3" type="audio/mpeg">
  <!-- Fallback: a chill synthwave track from Pixabay (Creative Commons) -->
  <source src="https://cdn.pixabay.com/audio/2022/11/22/audio_3b8b8b8b8b.mp3" type="audio/mpeg">
</audio>
<div class="music-toggle" id="musicToggle">
  <i class="fas fa-music"></i> <span id="musicText">Bật nhạc</span>
</div>

<div class="container">
  <!-- ========== CREATOR MODE (no key param) ========= -->
  <div id="creatorSection">
    <div class="neon-card">
      <h1 class="glow-text" style="font-size: 2.8rem; margin-bottom: 0.5rem; display: flex; gap: 12px; align-items: center;">
        <i class="fas fa-key" style="color: #0af;"></i> KEY•FORGE
      </h1>
      <p style="color: #aad0ff; margin-bottom: 2rem; font-size: 1.1rem;">
        <i class="fas fa-link"></i> Tạo key bí mật, link tự hủy sau 24h · Neon Vault
      </p>

      <!-- Tạo key mới -->
      <div style="display: flex; flex-direction: column; gap: 18px;">
        <div>
          <label style="display: block; margin-bottom: 8px; font-weight: 600; letter-spacing: 1px;"><i class="fas fa-paste"></i> DÁN KEY CỦA BẠN</label>
          <input type="text" id="keyInput" class="neon-input" style="width: 100%;" placeholder="Nhập key bí mật... VD: SUPPER-SECRET-2026">
        </div>
        <div style="display: flex; gap: 16px; flex-wrap: wrap;">
          <button class="neon-btn" id="generateBtn"><i class="fas fa-bolt"></i> TẠO LINK CHIA SẺ</button>
          <button class="neon-btn" id="clearStorageBtn" style="border-color: #ff5577; color: #ff99aa; box-shadow: 0 0 10px #ff3366;"><i class="fas fa-trash-alt"></i> Xóa tất cả</button>
        </div>
      </div>

      <!-- Danh sách key đã tạo -->
      <div style="margin-top: 2.8rem;">
        <h2 style="display: flex; align-items: center; gap: 8px; margin-bottom: 1.5rem;">
          <i class="fas fa-history" style="color: #0af;"></i> <span class="glow-text">DANH SÁCH KEY ĐÃ TẠO</span> 
          <span style="font-size: 0.9rem; background: #0a1a2a; padding: 5px 14px; border-radius: 30px;">có thể sửa</span>
        </h2>
        <div id="keysListContainer">
          <!-- dynamic list -->
        </div>
        <div id="emptyListMsg" style="text-align: center; padding: 30px; opacity: 0.8; font-style: italic; border: 1px dashed #2a4a7a; border-radius: 40px;">
          ⚡ Chưa có key nào. Hãy tạo key đầu tiên!
        </div>
      </div>
    </div>
  </div>

  <!-- ========== VIEWER MODE (có key param) ========= -->
  <div id="viewerSection" style="display: none;">
    <div class="neon-card" style="max-width: 700px; margin: 0 auto;">
      <div style="text-align: center; margin-bottom: 1rem;">
        <i class="fas fa-gem" style="font-size: 3.5rem; color: #3cc6ff; filter: drop-shadow(0 0 25px cyan);"></i>
        <h1 class="glow-text" style="font-size: 2.5rem;">KEY RECEIVER</h1>
      </div>

      <!-- Trạng thái key / hết hạn -->
      <div id="keyStatusArea">
        <!-- Nội dung động -->
      </div>

      <!-- Ô hiển thị key + copy -->
      <div id="activeKeyPanel" style="display: none;">
        <div class="key-display-box">
          <div style="margin-bottom: 18px; font-size: 1.3rem; letter-spacing: 3px;">
            <i class="fas fa-shield-alt"></i> KEY BÍ MẬT
          </div>
          <div style="background: #000c1a; border-radius: 40px; padding: 18px; border: 1px solid #ff5555;">
            <code id="displayKey" style="font-size: 2.2rem; font-weight: bold; word-break: break-all; color: #fff3bf; text-shadow: 0 0 12px gold;">-----</code>
          </div>
          <div style="margin-top: 28px; display: flex; gap: 16px; justify-content: center; flex-wrap: wrap;">
            <button class="neon-btn" id="copyKeyBtn" style="padding: 0.9rem 2.5rem;"><i class="far fa-copy"></i> COPY KEY</button>
            <span id="copySuccessMsg" style="align-self: center; color: #a5ffae;"></span>
          </div>
          <p style="margin-top: 24px; font-size: 1rem; border-top: 1px solid #1e4977; padding-top: 16px;">
            <i class="fas fa-hourglass-end"></i> <span id="expireNote">Key sẽ hết hạn sau: <strong id="countdownTimer" class="timer-glow">--:--:--</strong></span>
          </p>
          <div style="margin-top: 8px;">
            <span id="expireBadge" style="background: #2a0000; padding: 6px 18px; border-radius: 40px; color: #ff8888;"><i class="far fa-clock"></i> Còn hiệu lực</span>
          </div>
        </div>
      </div>

      <!-- Panel hết hạn -->
      <div id="expiredPanel" style="display: none; text-align: center; padding: 2rem;">
        <i class="fas fa-skull" style="font-size: 4rem; color: #ff4f4f; filter: drop-shadow(0 0 30px red);"></i>
        <h2 style="margin: 20px 0; color: #ff9e9e;">KEY ĐÃ HẾT HẠN</h2>
        <p style="opacity: 0.9;">Liên kết này không còn hiệu lực sau 24h.</p>
        <button class="neon-btn" style="margin-top: 30px;" onclick="window.location.href=window.location.origin+window.location.pathname;">⟲ VỀ TRANG TẠO KEY</button>
      </div>

      <!-- Nút quay lại creator -->
      <div style="margin-top: 30px; text-align: center;">
        <button class="neon-btn" style="border-color: #6f6fff;" onclick="window.location.href=window.location.origin+window.location.pathname;"><i class="fas fa-arrow-left"></i> TRANG CHỦ</button>
      </div>
    </div>
  </div>
</div>

<script>
  (function(){
    "use strict";

    // ---------- CONFIG ----------
    const STORAGE_KEY = 'neon_key_vault';
    const DEFAULT_EXPIRE_HOURS = 24;

    // DOM elements
    const creatorSection = document.getElementById('creatorSection');
    const viewerSection = document.getElementById('viewerSection');
    const keyInput = document.getElementById('keyInput');
    const generateBtn = document.getElementById('generateBtn');
    const clearStorageBtn = document.getElementById('clearStorageBtn');
    const keysListContainer = document.getElementById('keysListContainer');
    const emptyListMsg = document.getElementById('emptyListMsg');
    
    // Viewer elements
    const keyStatusArea = document.getElementById('keyStatusArea');
    const activeKeyPanel = document.getElementById('activeKeyPanel');
    const expiredPanel = document.getElementById('expiredPanel');
    const displayKey = document.getElementById('displayKey');
    const copyKeyBtn = document.getElementById('copyKeyBtn');
    const copySuccessMsg = document.getElementById('copySuccessMsg');
    const countdownTimer = document.getElementById('countdownTimer');
    const expireBadge = document.getElementById('expireBadge');

    // Music
    const bgMusic = document.getElementById('bgMusic');
    const musicToggle = document.getElementById('musicToggle');
    const musicText = document.getElementById('musicText');
    let musicPlaying = false;
    
    // Fireworks trigger
    function fireConfetti() {
      confetti({ particleCount: 150, spread: 100, origin: { y: 0.6 } });
      confetti({ particleCount: 100, spread: 80, origin: { y: 0.5, x: 0.3 }, colors: ['#26ccff', '#a25eff', '#ff4d6d'] });
      confetti({ particleCount: 100, spread: 80, origin: { y: 0.5, x: 0.7 }, colors: ['#00d4ff', '#ffb347', '#ff3b3b'] });
      setTimeout(() => {
        confetti({ particleCount: 200, spread: 120, origin: { y: 0.5 } });
      }, 150);
    }

    // ---------- LOCAL STORAGE ----------
    function loadKeys() {
      const stored = localStorage.getItem(STORAGE_KEY);
      return stored ? JSON.parse(stored) : [];
    }

    function saveKeys(keys) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(keys));
    }

    // Tạo ID đơn giản
    function generateId() {
      return Date.now() + '-' + Math.random().toString(36).substr(2, 6);
    }

    // Render danh sách key (creator)
    function renderKeysList() {
      const keys = loadKeys();
      if (keys.length === 0) {
        keysListContainer.innerHTML = '';
        emptyListMsg.style.display = 'block';
        return;
      }
      emptyListMsg.style.display = 'none';
      let html = '';
      keys.sort((a, b) => b.created - a.created).forEach(k => {
        const expired = k.expiresAt < Date.now();
        const expDate = new Date(k.expiresAt).toLocaleString('vi-VN');
        const shortKey = k.key.length > 25 ? k.key.substring(0, 22) + '…' : k.key;
        const link = `${window.location.origin}${window.location.pathname}?key=${encodeURIComponent(k.key)}&exp=${k.expiresAt}`;
        
        html += `
          <div class="key-item" data-id="${k.id}">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;">
              <div style="flex:2; min-width: 180px;">
                <div style="display: flex; align-items: center; gap: 8px;">
                  <i class="fas fa-key" style="color: #0af;"></i>
                  <code style="background: #001e3c; padding: 5px 12px; border-radius: 30px; font-size: 1rem;">${shortKey}</code>
                  ${expired ? '<span class="expired-badge"><i class="fas fa-ban"></i> Hết hạn</span>' : ''}
                </div>
                <div style="margin-top: 8px; font-size: 0.8rem; opacity: 0.8;">
                  <i class="far fa-calendar"></i> Hết hạn: ${expDate}
                </div>
              </div>
              <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                <button class="copy-link-btn neon-btn" style="padding: 0.4rem 1.2rem; font-size: 0.8rem;" data-link="${link}"><i class="fas fa-link"></i> Copy link</button>
                <button class="edit-key-btn neon-btn" style="padding: 0.4rem 1.2rem; font-size: 0.8rem; border-color: #ffaa33; color: #ffcc88;" data-id="${k.id}" data-key="${k.key.replace(/"/g, '&quot;')}"><i class="fas fa-edit"></i> Sửa</button>
                <button class="delete-key-btn neon-btn" style="padding: 0.4rem 1.2rem; font-size: 0.8rem; border-color: #ff5e7a; color: #ffa5b9;" data-id="${k.id}"><i class="fas fa-trash"></i> Xóa</button>
              </div>
            </div>
          </div>
        `;
      });
      keysListContainer.innerHTML = html;

      // Gắn sự kiện copy link
      document.querySelectorAll('.copy-link-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const link = btn.dataset.link;
          navigator.clipboard?.writeText(link).then(() => {
            alert('🔗 Link đã sao chép! Chia sẻ ngay.');
          }).catch(() => prompt('Copy thủ công:', link));
        });
      });

      // Sự kiện sửa
      document.querySelectorAll('.edit-key-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const id = btn.dataset.id;
          const oldKey = btn.dataset.key;
          const keysData = loadKeys();
          const keyObj = keysData.find(k => k.id === id);
          if (!keyObj) return;
          
          const newKey = prompt('✏️ Chỉnh sửa nội dung key:', oldKey);
          if (newKey !== null && newKey.trim() !== '') {
            keyObj.key = newKey.trim();
            // Reset thời hạn 24h từ lúc sửa (tùy chọn, có thể giữ nguyên)
            keyObj.expiresAt = Date.now() + DEFAULT_EXPIRE_HOURS * 60 * 60 * 1000;
            saveKeys(keysData);
            renderKeysList();
          }
        });
      });

      // Sự kiện xóa
      document.querySelectorAll('.delete-key-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const id = btn.dataset.id;
          let keysData = loadKeys();
          keysData = keysData.filter(k => k.id !== id);
          saveKeys(keysData);
          renderKeysList();
        });
      });
    }

    // Tạo key mới
    function createNewKey() {
      const rawKey = keyInput.value.trim();
      if (!rawKey) {
        alert('⚠️ Vui lòng nhập key!');
        return;
      }
      const keys = loadKeys();
      const newKeyObj = {
        id: generateId(),
        key: rawKey,
        created: Date.now(),
        expiresAt: Date.now() + DEFAULT_EXPIRE_HOURS * 60 * 60 * 1000
      };
      keys.push(newKeyObj);
      saveKeys(keys);
      
      // Tạo link và hiển thị nhanh
      const link = `${window.location.origin}${window.location.pathname}?key=${encodeURIComponent(rawKey)}&exp=${newKeyObj.expiresAt}`;
      keyInput.value = ''; 
      renderKeysList();

      // Copy link tự động?
      navigator.clipboard?.writeText(link).then(() => {
        alert(`✨ Link đã được sao chép! Chia sẻ: ${link}`);
      }).catch(() => prompt('📋 Link của bạn (sao chép thủ công):', link));
    }

    // Xóa tất cả
    function clearAllKeys() {
      if (confirm('Xóa TOÀN BỘ key đã lưu? Hành động không hoàn tác.')) {
        localStorage.removeItem(STORAGE_KEY);
        renderKeysList();
      }
    }

    // ---------- VIEWER MODE LOGIC ----------
    function parseQueryParams() {
      const params = new URLSearchParams(window.location.search);
      const key = params.get('key');
      const exp = params.get('exp');
      return { key, exp: exp ? parseInt(exp) : null };
    }

    function handleViewerMode() {
      const { key, exp } = parseQueryParams();
      if (!key || !exp) {
        // không phải viewer
        creatorSection.style.display = 'block';
        viewerSection.style.display = 'none';
        return false;
      }
      
      creatorSection.style.display = 'none';
      viewerSection.style.display = 'block';
      
      const now = Date.now();
      const isValid = exp > now;
      
      if (!isValid) {
        activeKeyPanel.style.display = 'none';
        expiredPanel.style.display = 'block';
        return true;
      }
      
      // Key còn hạn -> hiển thị, bắn pháo hoa
      expiredPanel.style.display = 'none';
      activeKeyPanel.style.display = 'block';
      displayKey.textContent = key;
      
      // Fireworks 🎆
      fireConfetti();
      
      // Đếm ngược
      function updateCountdown() {
        const remaining = exp - Date.now();
        if (remaining <= 0) {
          countdownTimer.textContent = 'HẾT HẠN';
          expireBadge.innerHTML = '<i class="fas fa-times-circle"></i> Đã hết hạn';
          // Chuyển sang panel hết hạn nếu muốn
          activeKeyPanel.style.display = 'none';
          expiredPanel.style.display = 'block';
          return;
        }
        const hours = Math.floor(remaining / 3600000);
        const minutes = Math.floor((remaining % 3600000) / 60000);
        const seconds = Math.floor((remaining % 60000) / 1000);
        countdownTimer.textContent = `${hours.toString().padStart(2,'0')}:${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;
        expireBadge.innerHTML = `<i class="far fa-clock"></i> Còn ${hours}h ${minutes}m`;
      }
      updateCountdown();
      const interval = setInterval(updateCountdown, 1000);
      
      // Copy button
      copyKeyBtn.onclick = () => {
        navigator.clipboard?.writeText(key).then(() => {
          copySuccessMsg.textContent = '✅ Đã copy!';
          confetti({ particleCount: 60, spread: 50, origin: { y: 0.7 } });
          setTimeout(() => copySuccessMsg.textContent = '', 2000);
        }).catch(() => alert('Sao chép thủ công: ' + key));
      };

      // Dọn interval khi rời trang (optional)
      window.addEventListener('beforeunload', () => clearInterval(interval));
      
      return true;
    }

    // ---------- MUSIC CONTROL ----------
    function initMusic() {
      musicToggle.addEventListener('click', () => {
        if (musicPlaying) {
          bgMusic.pause();
          musicText.textContent = 'Bật nhạc';
          musicToggle.innerHTML = '<i class="fas fa-music"></i> <span>Bật nhạc</span>';
        } else {
          bgMusic.play().catch(e => console.log('Autoplay blocked, cần tương tác'));
          musicText.textContent = 'Tắt nhạc';
          musicToggle.innerHTML = '<i class="fas fa-volume-up"></i> <span>Tắt nhạc</span>';
        }
        musicPlaying = !musicPlaying;
      });
      
      // Thử phát nhạc sau khi click bất kỳ đâu (cải thiện UX)
      document.body.addEventListener('click', function tryPlay() {
        if (!musicPlaying) {
          bgMusic.play().then(() => {
            musicPlaying = true;
            musicText.textContent = 'Tắt nhạc';
            musicToggle.innerHTML = '<i class="fas fa-volume-up"></i> <span>Tắt nhạc</span>';
          }).catch(()=>{});
        }
      }, { once: true });
    }

    // ---------- INIT PAGE ----------
    function init() {
      // Xác định mode
      const isViewer = handleViewerMode();
      
      if (!isViewer) {
        // Creator mode
        renderKeysList();
        generateBtn.addEventListener('click', createNewKey);
        clearStorageBtn.addEventListener('click', clearAllKeys);
        keyInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') createNewKey(); });
      }
      
      initMusic();
      
      // Nếu là viewer, tự động thử phát nhạc (đã có tương tác)
      if (isViewer) {
        setTimeout(() => {
          if (!musicPlaying) bgMusic.play().then(()=>{
            musicPlaying=true; 
            musicText.textContent='Tắt nhạc';
            musicToggle.innerHTML='<i class="fas fa-volume-up"></i> <span>Tắt nhạc</span>';
          }).catch(()=>{});
        }, 800);
      }
    }

    init();
  })();
</script>
<!-- thêm style cho mobile -->
<style>
  @media (max-width: 600px) {
    body { padding: 0.8rem; }
    .neon-card { padding: 1.5rem; }
    h1.glow-text { font-size: 2rem !important; }
  }
</style>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>✨ KEY GLOW · Neon Vault ✨</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
  <script src="https://www.google.com/recaptcha/api.js" async defer></script>
  
  <style>
    /* Giữ nguyên toàn bộ CSS của ông */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { min-height: 100vh; background: radial-gradient(circle at 20% 30%, #0b0e1e, #010101); font-family: 'Inter', sans-serif; color: #e0f2fe; padding: 1.5rem; display: flex; align-items: center; justify-content: center; position: relative; }
    .glow-text { text-shadow: 0 0 12px #00a6ff, 0 0 25px #0050b3; font-family: 'Orbitron', sans-serif; letter-spacing: 2px; }
    .neon-card { background: rgba(5, 10, 20, 0.75); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); border: 1px solid rgba(0, 180, 255, 0.35); box-shadow: 0 0 30px rgba(0, 160, 255, 0.2), inset 0 0 10px rgba(0, 200, 255, 0.1); border-radius: 32px; padding: 2rem; transition: all 0.2s; }
    .neon-input { background: #0a111f; border: 1.5px solid #1e3a5f; color: #b3e4ff; border-radius: 60px; padding: 0.9rem 1.5rem; font-size: 1.1rem; outline: none; transition: 0.2s; box-shadow: inset 0 0 8px #00000066, 0 0 5px #0066ff40; }
    .neon-input:focus { border-color: #00b4ff; box-shadow: 0 0 20px #0077ff, inset 0 0 5px #001d3d; }
    .neon-btn { background: transparent; border: 2px solid #0af; color: #0af; font-weight: 700; padding: 0.8rem 2rem; border-radius: 60px; font-family: 'Orbitron', sans-serif; letter-spacing: 1.5px; backdrop-filter: blur(8px); box-shadow: 0 0 15px #00a6ff, inset 0 0 5px #00aaff; transition: 0.2s; cursor: pointer; text-transform: uppercase; }
    .neon-btn:hover { background: #0af; color: #010101; box-shadow: 0 0 30px #3ab4ff, 0 0 10px #ffffff; border-color: #ffffff; }
    .key-display-box { background: #03070e; border: 2px solid #ff3b3b; box-shadow: 0 0 30px #ff0000aa, inset 0 0 15px #4a0000; border-radius: 28px; padding: 1.8rem; text-align: center; }
    .timer-glow { color: #ffb86b; text-shadow: 0 0 8px #ff7b00; }
    .key-item { background: #0a1424cc; border-left: 6px solid #0af; border-radius: 20px; padding: 1rem 1.5rem; margin: 0.8rem 0; backdrop-filter: blur(5px); box-shadow: 0 0 12px #002bff40; }
    .music-toggle { position: fixed; bottom: 20px; right: 20px; background: #101b2bdd; border: 1px solid cyan; border-radius: 60px; padding: 10px 18px; color: #a0e7ff; backdrop-filter: blur(8px); z-index: 999; cursor: pointer; font-weight: bold; }
    .container { max-width: 1000px; width: 100%; margin: 0 auto; }
    h1, h2 { font-family: 'Orbitron', sans-serif; }
    .expired-badge { color: #ff7b7b; border: 1px solid red; padding: 2px 12px; border-radius: 40px; }
    
    /* CSS cho Captcha */
    #captcha-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 20px 0;
    }
  </style>
</head>
<body>

<audio id="bgMusic" loop preload="auto">
  <source src="https://cdn.pixabay.com/audio/2023/09/07/audio_5b9b9b9b9b.mp3" type="audio/mpeg">
</audio>
<div class="music-toggle" id="musicToggle">
  <i class="fas fa-music"></i> <span id="musicText">Bật nhạc</span>
</div>

<div class="container">
  <div id="creatorSection">
    <div class="neon-card">
      <h1 class="glow-text" style="font-size: 2.8rem; margin-bottom: 0.5rem; display: flex; gap: 12px; align-items: center;">
        <i class="fas fa-key" style="color: #0af;"></i> KEY•FORGE
      </h1>
      <p style="color: #aad0ff; margin-bottom: 2rem; font-size: 1.1rem;">
        <i class="fas fa-link"></i> Tạo key bí mật có xác thực Captcha
      </p>

      <div style="display: flex; flex-direction: column; gap: 18px;">
        <div>
          <label style="display: block; margin-bottom: 8px; font-weight: 600; letter-spacing: 1px;"><i class="fas fa-paste"></i> DÁN KEY CỦA BẠN</label>
          <input type="text" id="keyInput" class="neon-input" style="width: 100%;" placeholder="Nhập key bí mật...">
        </div>
        <div style="display: flex; gap: 16px; flex-wrap: wrap;">
          <button class="neon-btn" id="generateBtn"><i class="fas fa-bolt"></i> TẠO LINK CHIA SẺ</button>
          <button class="neon-btn" id="clearStorageBtn" style="border-color: #ff5577; color: #ff99aa;"><i class="fas fa-trash-alt"></i> Xóa tất cả</button>
        </div>
      </div>

      <div style="margin-top: 2.8rem;">
        <h2 style="display: flex; align-items: center; gap: 8px; margin-bottom: 1.5rem;">
          <i class="fas fa-history" style="color: #0af;"></i> <span class="glow-text">DANH SÁCH ĐÃ TẠO</span> 
        </h2>
        <div id="keysListContainer"></div>
        <div id="emptyListMsg" style="text-align: center; padding: 30px; opacity: 0.8; font-style: italic; border: 1px dashed #2a4a7a; border-radius: 40px;">
          ⚡ Chưa có key nào.
        </div>
      </div>
    </div>
  </div>

  <div id="viewerSection" style="display: none;">
    <div class="neon-card" style="max-width: 700px; margin: 0 auto;">
      <div style="text-align: center; margin-bottom: 1rem;">
        <i class="fas fa-shield-virus" style="font-size: 3.5rem; color: #3cc6ff; filter: drop-shadow(0 0 25px cyan);"></i>
        <h1 class="glow-text" style="font-size: 2.5rem;">XÁC MINH</h1>
      </div>

      <div id="captchaPanel" style="text-align: center;">
        <p style="margin-bottom: 20px;">Vui lòng xác minh bạn không phải robot để lấy Key.</p>
        <div id="captcha-container">
           <div class="g-recaptcha" 
               data-sitekey="6Leu0bgsAAAAADdMaAoOd4G-MrXjTGEDewHiD7DC" 
               data-callback="onCaptchaSuccess"></div>
        </div>
      </div>

      <div id="activeKeyPanel" style="display: none;">
        <div class="key-display-box">
          <div style="margin-bottom: 18px; font-size: 1.3rem; letter-spacing: 3px;">
            <i class="fas fa-unlock-alt"></i> KEY CỦA BẠN
          </div>
          <div style="background: #000c1a; border-radius: 40px; padding: 18px; border: 1px solid #ff5555;">
            <code id="displayKey" style="font-size: 2.2rem; font-weight: bold; word-break: break-all; color: #fff3bf; text-shadow: 0 0 12px gold;">-----</code>
          </div>
          <div style="margin-top: 28px;">
            <button class="neon-btn" id="copyKeyBtn"><i class="far fa-copy"></i> COPY KEY</button>
          </div>
          <p style="margin-top: 24px;"><span id="countdownTimer" class="timer-glow">--:--:--</span></p>
        </div>
      </div>

      <div id="expiredPanel" style="display: none; text-align: center; padding: 2rem;">
        <h2 style="color: #ff9e9e;">LINK HẾT HẠN</h2>
        <button class="neon-btn" style="margin-top: 30px;" onclick="location.href=location.origin+location.pathname">QUAY LẠI</button>
      </div>
    </div>
  </div>
</div>

<script>
  (function(){
    "use strict";

    // 1. CHỐNG BYPASS TRỰC TIẾP (REFERRER)
    function checkReferrer() {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('key')) {
            const ref = document.referrer;
            // Nếu không có trang giới thiệu (vào trực tiếp) 
            // Ông có thể thêm domain vào whitelist ở đây
            if (!ref && !window.location.hostname.includes('localhost')) {
                // alert("Vui lòng truy cập từ trang chủ!");
                // window.location.href = "https://google.com"; 
            }
        }
    }
    checkReferrer();

    const STORAGE_KEY = 'neon_key_vault';
    const creatorSection = document.getElementById('creatorSection');
    const viewerSection = document.getElementById('viewerSection');
    const displayKey = document.getElementById('displayKey');

    // Chạy khi giải xong Captcha
    window.onCaptchaSuccess = function(token) {
        document.getElementById('captchaPanel').style.display = 'none';
        document.getElementById('activeKeyPanel').style.display = 'block';
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
    };

    function loadKeys() { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
    function saveKeys(keys) { localStorage.setItem(STORAGE_KEY, JSON.stringify(keys)); }

    function renderKeysList() {
      const keys = loadKeys();
      const container = document.getElementById('keysListContainer');
      const emptyMsg = document.getElementById('emptyListMsg');
      if (keys.length === 0) { container.innerHTML = ''; emptyMsg.style.display = 'block'; return; }
      emptyMsg.style.display = 'none';
      container.innerHTML = keys.map(k => {
        const link = `${location.origin}${location.pathname}?key=${btoa(encodeURIComponent(k.key))}&exp=${k.expiresAt}`;
        return `
          <div class="key-item">
            <code style="color:#0af">${k.key}</code>
            <div style="margin-top:10px">
              <button class="neon-btn" style="padding:5px 15px; font-size:10px" onclick="navigator.clipboard.writeText('${link}');alert('Đã copy link!')">Copy Link</button>
              <button class="neon-btn" style="padding:5px 15px; font-size:10px; border-color:red; color:red" onclick="deleteKey('${k.id}')">Xóa</button>
            </div>
          </div>
        `;
      }).join('');
    }

    window.deleteKey = function(id) {
        let keys = loadKeys().filter(k => k.id !== id);
        saveKeys(keys);
        renderKeysList();
    }

    document.getElementById('generateBtn').onclick = function() {
      const val = document.getElementById('keyInput').value.trim();
      if(!val) return;
      const keys = loadKeys();
      keys.push({ id: Date.now().toString(), key: val, expiresAt: Date.now() + 86400000 });
      saveKeys(keys);
      document.getElementById('keyInput').value = '';
      renderKeysList();
    };

    // Viewer Logic
    const params = new URLSearchParams(window.location.search);
    if (params.has('key')) {
      creatorSection.style.display = 'none';
      viewerSection.style.display = 'block';
      const exp = parseInt(params.get('exp'));
      if (Date.now() > exp) {
        document.getElementById('captchaPanel').style.display = 'none';
        document.getElementById('expiredPanel').style.display = 'block';
      } else {
        try {
            displayKey.textContent = decodeURIComponent(atob(params.get('key')));
        } catch(e) { displayKey.textContent = "Error Key"; }
      }
    }

    document.getElementById('copyKeyBtn').onclick = function() {
      navigator.clipboard.writeText(displayKey.textContent);
      alert("Đã copy key!");
    };

    renderKeysList();
  })();
</script>
</body>
</html>

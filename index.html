<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>✨ PREMIUM KEY SYSTEM ✨</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Inter:wght@300;400;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>

    <style>
        /* ============================================================
           HỆ THỐNG CSS CUSTOM - CHI TIẾT ĐỂ TĂNG TRẢI NGHIỆM & ĐỘ DÀI
           ============================================================
        */
        :root {
            --primary-color: #00d2ff;
            --secondary-color: #9d00ff;
            --accent-color: #00ffaa;
            --bg-deep: #020205;
            --card-bg: rgba(10, 15, 30, 0.85);
            --border-glow: rgba(0, 210, 255, 0.4);
            --transition-speed: 0.4s;
        }

        /* Reset & Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            outline: none;
        }

        body {
            background-color: var(--bg-deep);
            color: #e0f2fe;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; /* Giữ các hạt trong màn hình */
        }

        /* Canvas nền Particles */
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #0a1128 0%, #000 100%);
        }

        /* Khung chứa chính */
        .container {
            width: 95%;
            max-width: 550px;
            perspective: 1000px;
            z-index: 10;
        }

        /* Hiệu ứng Card Thủy tinh (Glassmorphism) */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glow);
            border-radius: 40px;
            padding: 50px 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7),
                        0 0 20px rgba(0, 210, 255, 0.1);
            position: relative;
            overflow: hidden;
            animation: cardAppear 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes cardAppear {
            from { opacity: 0; transform: translateY(50px) rotateX(-10deg); }
            to { opacity: 1; transform: translateY(0) rotateX(0); }
        }

        /* Header của Card */
        .card-header {
            margin-bottom: 35px;
        }

        .icon-box {
            width: 80px;
            height: 80px;
            background: rgba(0, 210, 255, 0.1);
            border: 2px solid var(--primary-color);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 2rem;
            color: var(--primary-color);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.3);
            animation: iconFloat 3s ease-in-out infinite;
        }

        @keyframes iconFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .title {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 2.2rem;
            letter-spacing: 2px;
            background: linear-gradient(to right, #00d2ff, #00ffaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(0, 210, 255, 0.4));
        }

        /* Khu vực hướng dẫn */
        .info-text {
            margin-top: 15px;
            font-size: 0.95rem;
            line-height: 1.6;
            color: rgba(224, 242, 254, 0.7);
        }

        .highlight {
            color: var(--accent-color);
            font-weight: 600;
        }

        /* Phần reCAPTCHA */
        .captcha-container {
            display: flex;
            justify-content: center;
            margin: 30px 0;
            min-height: 78px;
            transition: transform 0.3s ease;
        }

        .captcha-container:hover {
            transform: scale(1.02);
        }

        /* Nút lấy Key chính */
        .action-area {
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }

        .action-area.visible {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }

        .btn-premium {
            background: transparent;
            border: 2px solid var(--primary-color);
            color: var(--primary-color);
            padding: 18px 45px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: inline-flex;
            align-items: center;
            gap: 15px;
            transition: all var(--transition-speed);
            text-decoration: none;
            position: relative;
            overflow: hidden;
        }

        .btn-premium::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.5s;
        }

        .btn-premium:hover::before {
            left: 100%;
        }

        .btn-premium:hover {
            background: var(--primary-color);
            color: #000;
            box-shadow: 0 0 40px var(--primary-color);
            transform: translateY(-3px);
        }

        /* Widget Nhạc ở góc màn hình */
        .music-player {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid var(--border-glow);
            padding: 12px 25px;
            border-radius: 100px;
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 1000;
            cursor: pointer;
            transition: 0.3s;
        }

        .music-player:hover {
            background: rgba(0, 210, 255, 0.15);
            border-color: var(--primary-color);
        }

        .wave-container {
            display: flex;
            align-items: flex-end;
            gap: 3px;
            height: 20px;
        }

        .wave-bar {
            width: 3px;
            background: var(--primary-color);
            border-radius: 50px;
            animation: waveAnim 0.8s ease-in-out infinite alternate;
        }

        @keyframes waveAnim {
            from { height: 5px; }
            to { height: 20px; }
        }

        .song-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            color: var(--primary-color);
            letter-spacing: 1px;
        }

        /* Responsive cho điện thoại */
        @media (max-width: 480px) {
            .glass-card { padding: 35px 25px; }
            .title { font-size: 1.6rem; }
            .btn-premium { width: 100%; justify-content: center; }
            .music-player { bottom: 20px; left: 20px; right: 20px; justify-content: center; }
        }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <audio id="main-audio" loop>
        <source src="https://raw.githubusercontent.com/teoscrvn/Key-n-m-y-n-/9bb272229e900af4e6291cf179a896e7d762933a/Tnh%20Bn%20Diu%20K%20-%20Amee%20x%20Ricky%20Star%20x%20Lng%20LD%20%20TIKI%20DROPS%20REMIX.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <main class="glass-card">
            
            <div class="card-header">
                <div class="icon-box">
                    <i class="fas fa-shield-halved"></i>
                </div>
                <h1 class="title">XÁC MINH</h1>
                <p class="info-text">
                    Để đảm bảo an toàn, vui lòng xác nhận bạn không phải là robot. 
                    Mã <span class="highlight">Key Premium</span> sẽ xuất hiện sau khi hoàn thành.
                </p>
            </div>

            <div class="captcha-container">
                <div class="g-recaptcha" 
                     data-sitekey="6Leu0bgsAAAAADdMaAoOd4G-MrXjTGEDewHiD7DC" 
                     data-callback="onCaptchaSuccess">
                </div>
            </div>

            <div id="key-action" class="action-area">
                <a href="https://your-link-here.com" class="btn-premium" target="_blank">
                    <i class="fas fa-unlock-alt"></i> Bấm Để Lấy Key
                </a>
                <p style="margin-top: 20px; color: var(--accent-color); font-size: 0.8rem; font-family: 'Fira Code';">
                    Verification Status: <span style="text-decoration: underline;">Success</span>
                </p>
            </div>

        </main>
    </div>

    <div class="music-player" id="music-toggle">
        <div class="wave-container" id="music-bars">
            <div class="wave-bar" style="animation-delay: 0.1s"></div>
            <div class="wave-bar" style="animation-delay: 0.3s"></div>
            <div class="wave-bar" style="animation-delay: 0.2s"></div>
            <div class="wave-bar" style="animation-delay: 0.5s"></div>
        </div>
        <span class="song-name" id="song-status">NHẠC ĐANG TẮT</span>
    </div>

    <script>
        /* ============================================================
           HỆ THỐNG JAVASCRIPT - LOGIC XỬ LÝ & HIỆU ỨNG
           ============================================================
        */

        // 1. Quản lý Nhạc & Âm thanh
        const audio = document.getElementById('main-audio');
        const musicToggle = document.getElementById('music-toggle');
        const songStatus = document.getElementById('song-status');
        const musicBars = document.querySelectorAll('.wave-bar');

        function toggleMusic() {
            if (audio.paused) {
                audio.play().catch(e => console.log("Cần tương tác người dùng"));
                songStatus.innerText = "TÌNH BẠN DIỆU KỲ (REMIX)";
                musicBars.forEach(bar => bar.style.animationPlayState = 'running');
            } else {
                audio.pause();
                songStatus.innerText = "NHẠC ĐÃ TẮT";
                musicBars.forEach(bar => bar.style.animationPlayState = 'paused');
            }
        }

        // Tự động bật nhạc khi click lần đầu vào bất cứ đâu
        document.body.addEventListener('click', () => {
            if (audio.paused) toggleMusic();
        }, { once: true });

        musicToggle.addEventListener('click', toggleMusic);

        // 2. Xử lý sau khi giải xong Captcha
        function onCaptchaSuccess(token) {
            if (token) {
                // Hiệu ứng pháo hoa
                const duration = 3 * 1000;
                const end = Date.now() + duration;

                (function frame() {
                    confetti({
                        particleCount: 3,
                        angle: 60,
                        spread: 55,
                        origin: { x: 0 },
                        colors: ['#00d2ff', '#9d00ff']
                    });
                    confetti({
                        particleCount: 3,
                        angle: 120,
                        spread: 55,
                        origin: { x: 1 },
                        colors: ['#00ffaa', '#ffffff']
                    });

                    if (Date.now() < end) {
                        requestAnimationFrame(frame);
                    }
                }());

                // Hiện nút lấy Key
                const actionArea = document.getElementById('key-action');
                actionArea.classList.add('visible');
                
                // Hiệu ứng rung màn hình nhẹ khi hiện nút
                document.querySelector('.glass-card').style.animation = 'none';
                setTimeout(() => {
                    document.querySelector('.glass-card').style.boxShadow = '0 0 50px var(--primary-color)';
                }, 100);
            }
        }

        // 3. Hệ thống Hạt Nền (Particles) viết tay để tăng độ dài & đẹp
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particlesArray = [];

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = Math.random() * 1 - 0.5;
                this.speedY = Math.random() * 1 - 0.5;
                this.color = 'rgba(0, 210, 255, ' + (Math.random() * 0.5) + ')';
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function createParticles() {
            const count = (canvas.width * canvas.height) / 10000;
            for (let i = 0; i < count; i++) {
                particlesArray.push(new Particle());
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            requestAnimationFrame(animateParticles);
        }

        // Khởi tạo hệ thống
        window.addEventListener('resize', () => {
            initCanvas();
            particlesArray = [];
            createParticles();
        });

        initCanvas();
        createParticles();
        animateParticles();

        console.log("Hệ thống Key Forge đã sẵn sàng!");
    </script>
</body>
</html>
